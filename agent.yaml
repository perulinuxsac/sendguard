# SendGuard Agent — Configuración por servidor
# Copia este archivo a /etc/sendguard/agent.yaml en cada servidor Zimbra.

# Identificación del servidor
server_id: "cliente-abc-mail1"       # ID único del servidor (ej: cliente-nombre-mail1)
client_name: "Laboratorios ABC"      # Nombre del cliente (para reportes y alertas)

# Controller central — StoreAndForward (Fase 3)
# Con url vacío el agente opera en modo standalone: persiste alertas en SQLite local
# pero no las reenvía. Cuando el Controller esté disponible, configurar la URL aquí
# y el agente sincronizará automáticamente los eventos acumulados.
controller:
  url: ""                          # vacío = modo standalone
  api_key: ""                      # Bearer token de autenticación con el Controller
  sync_interval: 30                # segundos entre intentos de sincronización
  batch_size: 100                  # alertas por lote enviado al Controller

# Logs de Zimbra a monitorear
zimbra:
  logs:
    main:    "/var/log/mail.log"              # maillog de Postfix — SMTP/SASL (obligatorio)
    mailbox: "/opt/zimbra/log/mailbox.log"   # log de Zimbra — IMAP/POP3/SOAP (opcional, dejar vacío para deshabilitar)
  workers: 4
  zmprov_bin:   "/opt/zimbra/bin/zmprov"      # ruta completa a zmprov (systemd no incluye /opt/zimbra/bin en $PATH)
  postfix_sbin: "/opt/zimbra/common/sbin"    # directorio de binarios de Postfix de Zimbra
  postfix_conf: "/opt/zimbra/common/conf"    # directorio de configuración de Postfix de Zimbra
  # Para activar rate-limit, ejecutar una sola vez:
  #   zmprov mcf zimbraMtaSmtpdSenderRestrictions \
  #       "check_sender_access lmdb:/opt/zimbra/common/conf/sendguard_access" \
  #       "permit_sasl_authenticated" \
  #       "reject_unauthenticated_sender_login_mismatch"

# Reglas de detección — umbrales configurables por servidor
rules:
  auth_failed:
    max_auth_failures: 5    # bloquear IP tras 5 fallos en la ventana
    scan_time: 300          # ventana de 5 minutos (segundos)

  number_messages:
    max_messages: 300       # máximo 300 mensajes en la ventana
    scan_time: 3600         # ventana de 1 hora

  sasl_connections:
    max_sasl_connections: 20  # conexiones totales por cuenta en ventana (botnet concentrado)
    max_unique_ips: 5          # IPs distintas autenticando la misma cuenta (botnet distribuido) → bloquea todas + suspende
    scan_time: 300             # ventana de 5 minutos

  dist_brute_force:
    max_ips: 5                 # IPs distintas fallando contra la misma cuenta → notificar admin
    scan_time: 300             # ventana de 5 minutos

  impossible_traveler:
    window_minutes: 30      # login imposible si < 30 min entre países distintos

  queue_monitor:
    queue_threshold: 2500   # deferrals al mismo dominio destino en la ventana
    scan_time: 3600         # ventana de 1 hora

  domain_discovery:
    max_domains: 10         # dominios únicos atacados desde una IP en la ventana
    scan_time: 600          # ventana de 10 minutos

  bounce_rate:
    max_bounces: 50         # rebotes por cuenta antes de suspenderla
    scan_time: 300          # ventana de 5 minutos

  rcpt_flood:
    max_recipients: 50      # destinatarios únicos por IP en la ventana para bloquear IP + suspender cuenta
    scan_time: 300          # ventana de 5 minutos

# GeoIP — resolución IP → País
geoip:
  # db_path: "/var/lib/sendguard/GeoLite2-Country.mmdb"
  # Recomendado para producción: DB local MaxMind (sin red, sin rate-limit).
  # Registro gratuito en https://www.maxmind.com/en/geolite2/signup
  # Sin db_path, se usa el HTTP API (fallback).
  api_url: "https://ipinfo.io"   # fallback HTTP: 50k req/mes gratis
  # token: ""                    # opcional: token ipinfo.io para límite mayor
  cache_ttl: 24             # horas de cache (solo aplica al modo HTTP API)
  allowed_countries:        # países normales para esta cuenta (vacío = todos)
    - "PE"
    - "US"

# Base de datos local SQLite (persistencia de bans y StoreAndForward para Fase 3)
# El Agent crea el directorio automáticamente si no existe.
local_db:
  path: "/var/lib/sendguard/sendguard.db"
  max_size_mb: 100

# Firewall (única dependencia del sistema operativo)
# backend: "firewalld" para RHEL/CentOS/Rocky/AlmaLinux
#           "ufw"       para Ubuntu/Debian
firewall:
  backend: "firewalld"
  ban_seconds: 3600         # bloquear IP por 1 hora (0 = permanente)

# API HTTP de observabilidad y control
# Solo escucha en localhost por defecto; nunca exponer sin autenticación en producción.
api:
  listen: "127.0.0.1:9099"  # vacío = API deshabilitada
  # api_key: ""              # si se configura, los endpoints de escritura requieren X-Api-Key

# Notificaciones — canales activos cuando se ejecuta una acción de contención
# Cada canal se activa solo si sus campos requeridos están presentes.
notification:
  telegram:
    token: ""      # token del bot (vacío = canal desactivado)
    chat_id: ""    # ID del chat, grupo o canal destino
  # Webhook HTTP genérico (Slack, Teams, n8n, etc.)
  # webhook:
  #   url: ""        # endpoint destino (vacío = canal desactivado)
  #   timeout: 10    # segundos
  # Email via sendmail local de Zimbra (no requiere config SMTP)
  # email:
  #   from: "sendguard@midominio.com"
  #   to:
  #     - "noc@midominio.com"
  #   sendmail_bin: "/opt/zimbra/common/sbin/sendmail"

# AbuseIPDB — enriquece alertas con reputación de IPs (registro gratuito en abuseipdb.com)
# abuseipdb:
#   api_key: ""      # clave de API (vacío deshabilita la integración)
#   cache_ttl: 24    # horas de cache

# Audit log — registro NDJSON de cada acción de contención (compatible con jq, Loki, etc.)
# audit_log:
#   path: "/var/log/sendguard-audit.log"

# Whitelist — cuentas e IPs exentas de detección
whitelist:
  accounts:
    - "newsletter@cliente-abc.com"
    - "noreply@cliente-abc.com"
  ips:
    - "190.5.1.0/24"        # red de oficina del cliente
